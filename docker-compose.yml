version: '3.8'
services:
  mysql:
    image: mysql:latest
    container_name: mysql_container_1
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data_1:/var/lib/mysql

  php:
    image: php:8.3-apache
    container_name: php_container_1
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql
    ports:
    - "8081:80"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_container_1
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - mysql
